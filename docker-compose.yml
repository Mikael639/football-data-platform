services:
  postgres:
    image: postgres:16
    container_name: football_postgres
    environment:
      POSTGRES_USER: football
      POSTGRES_PASSWORD: football
      POSTGRES_DB: football_dw
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U football -d football_dw"]
      interval: 5s
      timeout: 5s
      retries: 20

  pipeline:
    build: .
    container_name: football_pipeline
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: football_dw
      DB_USER: football
      DB_PASSWORD: football
      DATABASE_URL: ${DATABASE_URL:-}
      FOOTBALL_DATA_TOKEN: ${FOOTBALL_DATA_TOKEN:-}
      FOOTBALL_DATA_BASE_URL: ${FOOTBALL_DATA_BASE_URL:-https://api.football-data.org/v4}
      FOOTBALL_DATA_SEASON: ${FOOTBALL_DATA_SEASON:-}
      FOOTBALL_DATA_COMPETITION: ${FOOTBALL_DATA_COMPETITION:-PD}
      COMPETITION_CODE: ${COMPETITION_CODE:-PD}
      FOOTBALL_DATA_TEAM_NAME: ${FOOTBALL_DATA_TEAM_NAME:-Real Madrid CF}
      DATA_MODE: ${DATA_MODE:-api}
      PIPELINE_MODE: ${PIPELINE_MODE:-api}
      INCREMENTAL: ${INCREMENTAL:-false}
      INCREMENTAL_DAYS: ${INCREMENTAL_DAYS:-14}
      DQ_FRESHNESS_DAYS: ${DQ_FRESHNESS_DAYS:-7}
      SUPABASE_DB_URL: ${SUPABASE_DB_URL:-}
      STUDY_SUPABASE_DB_URL: ${STUDY_SUPABASE_DB_URL:-}
      FBREF_STUDY_BACKEND: ${FBREF_STUDY_BACKEND:-local}
      FBREF_STUDY_MIN_MINUTES: ${FBREF_STUDY_MIN_MINUTES:-600}

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: football_dashboard
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: football_dw
      DB_USER: football
      DB_PASSWORD: football
      DATABASE_URL: ${DATABASE_URL:-}
      FOOTBALL_DATA_TOKEN: ${FOOTBALL_DATA_TOKEN:-}
      FOOTBALL_DATA_BASE_URL: ${FOOTBALL_DATA_BASE_URL:-https://api.football-data.org/v4}
      FOOTBALL_DATA_SEASON: ${FOOTBALL_DATA_SEASON:-}
      FOOTBALL_DATA_COMPETITION: ${FOOTBALL_DATA_COMPETITION:-PD}
      COMPETITION_CODE: ${COMPETITION_CODE:-PD}
      FOOTBALL_DATA_TEAM_NAME: ${FOOTBALL_DATA_TEAM_NAME:-Real Madrid CF}
      DATA_MODE: ${DATA_MODE:-api}
      PIPELINE_MODE: ${PIPELINE_MODE:-api}
      INCREMENTAL: ${INCREMENTAL:-false}
      INCREMENTAL_DAYS: ${INCREMENTAL_DAYS:-14}
      DQ_FRESHNESS_DAYS: ${DQ_FRESHNESS_DAYS:-7}
      SUPABASE_DB_URL: ${SUPABASE_DB_URL:-}
      STUDY_SUPABASE_DB_URL: ${STUDY_SUPABASE_DB_URL:-}
      FBREF_STUDY_BACKEND: ${FBREF_STUDY_BACKEND:-local}
    ports:
      - "${DASHBOARD_PORT:-9001}:8501"
    restart: "always"

volumes:
  pgdata:
