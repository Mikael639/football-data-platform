services:
  postgres:
    image: postgres:16
    container_name: football_postgres
    environment:
      POSTGRES_USER: football
      POSTGRES_PASSWORD: football
      POSTGRES_DB: football_dw
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U football -d football_dw"]
      interval: 5s
      timeout: 5s
      retries: 20

  pipeline:
    build: .
    container_name: football_pipeline
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: football_dw
      DB_USER: football
      DB_PASSWORD: football
      DATABASE_URL: ${DATABASE_URL:-}
      FOOTBALL_DATA_TOKEN: ${FOOTBALL_DATA_TOKEN:-}
      FOOTBALL_DATA_BASE_URL: ${FOOTBALL_DATA_BASE_URL:-https://api.football-data.org/v4}
      FOOTBALL_DATA_SEASON: ${FOOTBALL_DATA_SEASON:-}
      FOOTBALL_DATA_COMPETITION: ${FOOTBALL_DATA_COMPETITION:-PD}
      COMPETITION_CODE: ${COMPETITION_CODE:-PD}
      FOOTBALL_DATA_TEAM_NAME: ${FOOTBALL_DATA_TEAM_NAME:-Real Madrid CF}
      DATA_MODE: ${DATA_MODE:-api}
      PIPELINE_MODE: ${PIPELINE_MODE:-api}
      LIVE_COMPETITION_CODES: ${LIVE_COMPETITION_CODES:-PD,PL,SA,BL1,FL1,CL,EL,UCL}
      INCREMENTAL: ${INCREMENTAL:-false}
      INCREMENTAL_DAYS: ${INCREMENTAL_DAYS:-14}
      DQ_FRESHNESS_DAYS: ${DQ_FRESHNESS_DAYS:-7}
      ALERTS_ENABLED: ${ALERTS_ENABLED:-false}
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
      ALERT_SMTP_HOST: ${ALERT_SMTP_HOST:-}
      ALERT_SMTP_PORT: ${ALERT_SMTP_PORT:-587}
      ALERT_SMTP_USER: ${ALERT_SMTP_USER:-}
      ALERT_SMTP_PASSWORD: ${ALERT_SMTP_PASSWORD:-}
      ALERT_SMTP_FROM: ${ALERT_SMTP_FROM:-}
      ALERT_SMTP_TO: ${ALERT_SMTP_TO:-}
      ALERT_SMTP_STARTTLS: ${ALERT_SMTP_STARTTLS:-true}
      SUPABASE_DB_URL: ${SUPABASE_DB_URL:-}
      STUDY_SUPABASE_DB_URL: ${STUDY_SUPABASE_DB_URL:-}
      FBREF_STUDY_BACKEND: ${FBREF_STUDY_BACKEND:-local}
      FBREF_STUDY_MIN_MINUTES: ${FBREF_STUDY_MIN_MINUTES:-600}

  pipeline_scheduler:
    build: .
    container_name: football_pipeline_scheduler
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - sh
      - -c
      - while true; do python -m src.run_pipeline; sleep ${PIPELINE_INTERVAL_SECONDS:-1800}; done
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: football_dw
      DB_USER: football
      DB_PASSWORD: football
      DATABASE_URL: ${DATABASE_URL:-}
      FOOTBALL_DATA_TOKEN: ${FOOTBALL_DATA_TOKEN:-}
      FOOTBALL_DATA_BASE_URL: ${FOOTBALL_DATA_BASE_URL:-https://api.football-data.org/v4}
      FOOTBALL_DATA_SEASON: ${FOOTBALL_DATA_SEASON:-}
      FOOTBALL_DATA_COMPETITION: ${FOOTBALL_DATA_COMPETITION:-PD}
      COMPETITION_CODE: ${COMPETITION_CODE:-PD}
      FOOTBALL_DATA_TEAM_NAME: ${FOOTBALL_DATA_TEAM_NAME:-Real Madrid CF}
      DATA_MODE: ${DATA_MODE:-api}
      PIPELINE_MODE: ${PIPELINE_MODE:-api}
      LIVE_COMPETITION_CODES: ${LIVE_COMPETITION_CODES:-PD,PL,SA,BL1,FL1,CL,EL,UCL}
      INCREMENTAL: ${INCREMENTAL:-false}
      INCREMENTAL_DAYS: ${INCREMENTAL_DAYS:-14}
      DQ_FRESHNESS_DAYS: ${DQ_FRESHNESS_DAYS:-7}
      ALERTS_ENABLED: ${ALERTS_ENABLED:-false}
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
      ALERT_SMTP_HOST: ${ALERT_SMTP_HOST:-}
      ALERT_SMTP_PORT: ${ALERT_SMTP_PORT:-587}
      ALERT_SMTP_USER: ${ALERT_SMTP_USER:-}
      ALERT_SMTP_PASSWORD: ${ALERT_SMTP_PASSWORD:-}
      ALERT_SMTP_FROM: ${ALERT_SMTP_FROM:-}
      ALERT_SMTP_TO: ${ALERT_SMTP_TO:-}
      ALERT_SMTP_STARTTLS: ${ALERT_SMTP_STARTTLS:-true}
      SUPABASE_DB_URL: ${SUPABASE_DB_URL:-}
      STUDY_SUPABASE_DB_URL: ${STUDY_SUPABASE_DB_URL:-}
      FBREF_STUDY_BACKEND: ${FBREF_STUDY_BACKEND:-local}
      FBREF_STUDY_MIN_MINUTES: ${FBREF_STUDY_MIN_MINUTES:-600}
    restart: "always"

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: football_dashboard
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: football_dw
      DB_USER: football
      DB_PASSWORD: football
      DATABASE_URL: ${DATABASE_URL:-}
      FOOTBALL_DATA_TOKEN: ${FOOTBALL_DATA_TOKEN:-}
      FOOTBALL_DATA_BASE_URL: ${FOOTBALL_DATA_BASE_URL:-https://api.football-data.org/v4}
      FOOTBALL_DATA_SEASON: ${FOOTBALL_DATA_SEASON:-}
      FOOTBALL_DATA_COMPETITION: ${FOOTBALL_DATA_COMPETITION:-PD}
      COMPETITION_CODE: ${COMPETITION_CODE:-PD}
      FOOTBALL_DATA_TEAM_NAME: ${FOOTBALL_DATA_TEAM_NAME:-Real Madrid CF}
      DATA_MODE: ${DATA_MODE:-api}
      PIPELINE_MODE: ${PIPELINE_MODE:-api}
      LIVE_COMPETITION_CODES: ${LIVE_COMPETITION_CODES:-PD,PL,SA,BL1,FL1,CL,EL,UCL}
      INCREMENTAL: ${INCREMENTAL:-false}
      INCREMENTAL_DAYS: ${INCREMENTAL_DAYS:-14}
      DQ_FRESHNESS_DAYS: ${DQ_FRESHNESS_DAYS:-7}
      SUPABASE_DB_URL: ${SUPABASE_DB_URL:-}
      STUDY_SUPABASE_DB_URL: ${STUDY_SUPABASE_DB_URL:-}
      FBREF_STUDY_BACKEND: ${FBREF_STUDY_BACKEND:-local}
      DASHBOARD_ADMIN_USERNAME: ${DASHBOARD_ADMIN_USERNAME:-admin}
      DASHBOARD_ADMIN_PASSWORD: ${DASHBOARD_ADMIN_PASSWORD:-admin123!}
    ports:
      - "${DASHBOARD_PORT:-9001}:8501"
    restart: "always"

volumes:
  pgdata:
